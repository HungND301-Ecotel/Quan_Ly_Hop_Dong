services:
  hopdong_reverse_proxy_service:
    image: ${REGISTRY}/hopdong_reverse_proxy_img:${VERSION}
    ports:
      # HOST_PORT:CONTAINER_PORT
      - "1111:8888"
    stdin_open: true
    environment:
      - TZ=Asia/Ho_Chi_Minh
    networks:
      - frontnet
      - backend-net
    depends_on:
      - hopdong_frontend_service
      - hopdong_backend_service

  hopdong_frontend_service:
    image:
      ${REGISTRY}/hopdong_frontend_img:${VERSION}
      # target: development
    stdin_open: true
    environment:
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      # For development only, to synced src code to container
      - /usr/src/app/node_modules
      # restart: always
    networks:
      - frontnet

  hopdong_postgres:
    image: postgres:latest
    container_name: hopdong_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ecotel@2025
      POSTGRES_DB: hopdong_db
    ports:
      - "1112:5432"
    volumes:
      - hopdong_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  hopdong_pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hopdong_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ecotel.com
      PGADMIN_DEFAULT_PASSWORD: ecotel@2025
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "1114:80"
    depends_on:
      hopdong_postgres:
        condition: service_healthy
    volumes:
      - hopdong_pgadmin_data:/var/lib/pgadmin
    networks:
      - backend-net

  # --- .NET API Service ---
  hopdong_backend_service:
    image: ${REGISTRY}/hopdong_backend_img:${VERSION}
    container_name: hopdong_backend_service
    env_file:
      - .env_backend
    ports:
      - "1113:8175"
    environment:
      - ASPNETCORE_URLS=http://+:8175
      - ASPNETCORE_HTTP_PORTS=8175
      - ASPNETCORE_HTTPs_PORTS=8175
      - ASPNETCORE_ENVIRONMENT=Production

    depends_on:
      hopdong_postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8175/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend-net
    restart: unless-stopped

volumes:
  hopdong_postgres_data: # ✅ Cho postgres
    driver: local
    driver_opts:
      type: none
      device: /mnt/hdd/hopdong_postgres_data
      o: bind

  hopdong_pgadmin_data:
    driver: local
    driver_opts:
      type: none
      device: /mnt/hdd/hopdong_pgadmin_data
      o: bind

networks:
  backend-net:
  frontnet:
