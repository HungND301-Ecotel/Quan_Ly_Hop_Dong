services:
  hopdong_reverse_proxy_service_test:
    image: ${REGISTRY}/hopdong_reverse_proxy_img_test:${VERSION}
    ports:
      # HOST_PORT:CONTAINER_PORT
      - "1115:8888"
    stdin_open: true
    environment:
      - TZ=Asia/Ho_Chi_Minh
    networks:
      - frontnet
      - backend-net
    depends_on:
      - hopdong_frontend_service_test
      - hopdong_backend_service_test

  hopdong_frontend_service_test:
    image: ${REGISTRY}/hopdong_frontend_img_test:${VERSION} # target: development
    stdin_open: true
    environment:
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      # For development only, to synced src code to container
      - /usr/src/app/node_modules
      # restart: always
    networks:
      - frontnet

  hopdong_postgres_test:
    image: postgres:latest
    container_name: hopdong_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ecotel@2025
      POSTGRES_DB: hopdong_db
    ports:
      - "1116:5432"
    volumes:
      - hopdong_postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  hopdong_pgadmin_test:
    image: dpage/pgadmin4:latest
    container_name: hopdong_pgadmin_test
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ecotel.com
      PGADMIN_DEFAULT_PASSWORD: ecotel@2025
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "1117:80"
    depends_on:
      hopdong_postgres_test:
        condition: service_healthy
    volumes:
      - hopdong_pgadmin_data_test:/var/lib/pgadmin
    networks:
      - backend-net

  # --- .NET API Service ---
  hopdong_backend_service_test:
    image: ${REGISTRY}/hopdong_backend_img_test:${VERSION}
    container_name: hopdong_backend_service_test
    env_file:
      - .env_backend
    ports:
      - "1118:8175"
    environment:
      - ASPNETCORE_URLS=http://+:8175
      - ASPNETCORE_HTTP_PORTS=8175
      - ASPNETCORE_HTTPs_PORTS=8175
      - ASPNETCORE_ENVIRONMENT=Production

    depends_on:
      hopdong_postgres_test:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail http://localhost:8175/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend-net
    restart: unless-stopped

volumes:
  hopdong_postgres_data_test:
    # ✅ Cho postgres
    driver: local
    driver_opts:
      type: none
      device: /mnt/hdd/hopdong_postgres_data_test
      o: bind

  hopdong_pgadmin_data_test:
    driver: local
    driver_opts:
      type: none
      device: /mnt/hdd/hopdong_pgadmin_data_test
      o: bind

networks:
  backend-net:
  frontnet:
