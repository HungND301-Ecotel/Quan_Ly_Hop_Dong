services:
  # --- Database Service ---
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ecotel@2025
      POSTGRES_DB: kcp-web-db
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kcp-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ecotel.com 
      PGADMIN_DEFAULT_PASSWORD: ecotel@2025  
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "8888:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - backend-net

  # --- .NET API Service ---
  kcp-be-service:
    image: ptchd03/kcp-be-service:latest
    build:
      context: .
      dockerfile: src/Presentation/Host/Dockerfile
    container_name: kcp-be-service
    ports:
      - "7777:8175"
    environment:
      - ASPNETCORE_URLS=http://+:8175
      - ASPNETCORE_HTTP_PORTS=8175
      - ASPNETCORE_HTTPs_PORTS=8175
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8175/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend-net
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:

networks:
  backend-net:
    driver: bridge